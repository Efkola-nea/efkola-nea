<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <title>Άρθρο - Εύκολα Νέα</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <style>
    :root {
      --bg: #020617;
      --card-bg: #111827;
      --card-border: rgba(148, 163, 184, 0.3);
      --accent: #60a5fa;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      font-size: 18px;
      line-height: 1.75;
      position: relative;
      margin: 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: #93c5fd;
    }

    /* φλου full-screen backround για σοβαρές & lifestyle ειδήσεις */
    .article-bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.12;
      z-index: -1;
      filter: blur(1px);
    }

    .site-header {
      background: #0b1224;
      color: var(--text-main);
      padding: 1.6rem 0;
      margin-bottom: 1.6rem;
      border-bottom: 1px solid var(--card-border);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.28);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .site-header-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .site-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
      width: 100%;
    }

    .site-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .site-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.95rem;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      color: var(--text-main);
      text-decoration: none;
      font-weight: 700;
      background: transparent;
    }

    .back-link:hover {
      color: #f8fafc;
      border-color: rgba(96, 165, 250, 0.7);
      background: rgba(96, 165, 250, 0.08);
    }

    .page-wrapper {
      max-width: 820px;
      margin: 0 auto;
    }

    .article-main-card {
      border-radius: 20px;
      background: var(--card-bg);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
      padding: 1.4rem 1.5rem;
      border: 1px solid var(--card-border);
    }

    .article-main-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--text-main);
      text-align: center;
      letter-spacing: 0.05px;
    }

    .article-image-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: #0f172a;
      overflow: hidden;
      border-radius: 16px;
      margin-bottom: 1rem;
      border: 1px solid var(--card-border);
    }

    .article-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .article-video-wrapper {
      width: 100%;
      margin-bottom: 1rem;
    }

    .article-video {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      border: none;
      background-color: #000;
      display: block;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.32);
    }

    .article-body {
      font-size: 1.08rem;
      color: var(--text-main);
      margin-bottom: 1rem;
      line-height: 1.85;
    }

    .article-body br {
      line-height: 1.2;
    }

    .btn-listen {
      font-size: 0.98rem;
      border-radius: 999px;
      padding-inline: 1.2rem;
      font-weight: 700;
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #0b1224;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    }

    .btn-listen:hover {
      background: #93c5fd;
      border-color: #93c5fd;
      color: #0b1224;
    }

    /* 🔎 Ενότητα πηγών με απλή λίστα */
    .sources-box {
      margin-top: 1.25rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--card-border);
    }

    .sources-box p {
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      font-size: 0.95rem;
    }

    .sources-box ul {
      padding-left: 1rem;
      margin: 0;
      color: var(--text-main);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .sources-box li {
      margin-bottom: 0.2rem;
    }
  </style>
</head>
<body>
  <!-- full-screen background για σοβαρές & lifestyle ειδήσεις -->
  <div id="article-bg" class="article-bg" style="display:none;"></div>

  <header class="site-header">
    <div class="container">
      <div class="site-header-inner">
        <div class="site-header-top">
          <div id="site-title" class="site-title">📰 Εύκολα Νέα</div>
        </div>
        <div class="site-subtitle">Απλή και προσβάσιμη ενημέρωση για όλους</div>
      </div>
    </div>
  </header>

  <main class="container mb-5">
    <div class="page-wrapper">
      <div class="mb-3">
        <a
          class="back-link btn btn-outline-light btn-sm rounded-pill d-inline-flex align-items-center gap-2"
          href="index.html"
        >
          <span aria-hidden="true">←</span>
          <span>Πίσω</span>
        </a>
      </div>
      <article class="article-main-card">
        <h1 id="article-title" class="article-main-title">Φορτώνω το άρθρο…</h1>

        <!-- Εικόνα άρθρου (ΜΟΝΟ αν είναι Pixabay) -->
        <div id="article-image-wrapper" class="article-image-wrapper" style="display:none;">
          <img
            id="article-image"
            class="article-image"
            alt="Εικόνα άρθρου"
            style="display: none;"
          />
        </div>

        <!-- Βίντεο άρθρου -->
        <div id="article-video-wrapper" class="article-video-wrapper" style="display:none;">
          <div id="article-video-container"></div>
        </div>

        <div id="article-body" class="article-body">
          Παρακαλώ περίμενε λίγο…
        </div>

        <!-- Κουμπί ακρόασης -->
        <div class="d-flex justify-content-end mt-3">
          <button id="listen-btn" type="button" class="btn btn-primary btn-listen">
            Άκου την είδηση
          </button>
        </div>

        <!-- 🔚 Πηγές ΜΟΝΟ στο τέλος -->
        <div id="article-sources" class="sources-box"></div>
      </article>
    </div>
  </main>

  <script>
    const pageParams = new URLSearchParams(window.location.search);
    const sourceParam = pageParams.get("source") || "news";
    const idParam = pageParams.get("id");
    const categoryParam = pageParams.get("category");

    function escapeHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    // ✅ Επιτρέπουμε source εικόνες, αλλά μπλοκάρουμε Pixabay
    function isBlockedImageUrl(url) {
      return /(^|\/\/)(cdn\.)?pixabay\.com/i.test(String(url || ""));
    }

    // Κεντρικός helper για εικόνα (με onerror hide)
    function setArticleImage(imageWrapper, imageEl, imageUrl, altText) {
      if (!imageWrapper || !imageEl) return;

      const url = (imageUrl || "").trim();
      const ok = url && !isBlockedImageUrl(url);

      if (!ok) {
        imageEl.removeAttribute("src");
        imageEl.alt = "";
        imageEl.style.display = "none";
        imageWrapper.style.display = "none";
        imageEl.onerror = null;
        return;
      }

      imageEl.onerror = () => {
        imageEl.removeAttribute("src");
        imageEl.alt = "";
        imageEl.style.display = "none";
        imageWrapper.style.display = "none";
      };

      imageEl.src = url;
      imageEl.alt = altText || "Εικόνα άρθρου";
      imageEl.style.display = "block";
      imageWrapper.style.display = "block";
    }

    // Αφαιρούμε ενότητα "Πηγές:" που μπορεί να έχει γράψει το LLM
    function stripSourcesSection(text) {
      if (!text) return "";
      const markerIndex = text.lastIndexOf("Πηγές:");
      if (markerIndex === -1) return text;
      return text.slice(0, markerIndex).trim();
    }

    function cleanMarkdown(text) {
      if (!text) return "";
      const withoutSources = stripSourcesSection(text);
      return withoutSources
        .replace(/\*\*(.+?)\*\*/g, "$1")
        .replace(/###\s*/g, "")
        .trim();
    }

    // 🔊 Κατάσταση για play / pause / resume
    const ttsState = {
      utterance: null,
      isSpeaking: false,
      isPaused: false,
    };

    function setupTtsButton(buttonEl, title, bodyText) {
      const fullText = (title ? title + ". " : "") + (bodyText || "");

      buttonEl.textContent = "Άκου την είδηση";

      buttonEl.onclick = () => {
        if (!("speechSynthesis" in window)) {
          alert("Ο περιηγητής δεν υποστηρίζει ανάγνωση κειμένου.");
          return;
        }

        const synth = window.speechSynthesis;

        // αν ήδη μιλάει → παύση
        if (ttsState.isSpeaking && !ttsState.isPaused) {
          synth.pause();
          ttsState.isPaused = true;
          buttonEl.textContent = "Συνέχισε την είδηση";
          return;
        }

        // αν είναι σε pause → συνέχεια
        if (ttsState.isSpeaking && ttsState.isPaused) {
          synth.resume();
          ttsState.isPaused = false;
          buttonEl.textContent = "Παύση";
          return;
        }

        // ξεκινάμε νέα ανάγνωση
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(fullText);
        utterance.lang = "el-GR";

        utterance.onstart = () => {
          ttsState.isSpeaking = true;
          ttsState.isPaused = false;
          buttonEl.textContent = "Παύση";
        };

        utterance.onend = () => {
          ttsState.isSpeaking = false;
          ttsState.isPaused = false;
          buttonEl.textContent = "Άκου την είδηση";
        };

        utterance.onerror = () => {
          ttsState.isSpeaking = false;
          ttsState.isPaused = false;
          buttonEl.textContent = "Άκου την είδηση";
        };

        ttsState.utterance = utterance;
        synth.speak(utterance);
      };
    }

    /* ---------- Background helpers ---------- */
    // lifestyle & απλές κατηγορίες ανά category
    function lifestyleBackgroundForCategory(category) {
      switch (category) {
        case "serious":
          return "images/categories/serious.jpg";
        case "sports":
          return "images/categories/sports.jpg";
        case "screen":
          return "images/categories/series.jpg";
        case "culture":
          return "images/categories/theatre.jpg";
        case "fun":
          return "images/categories/fun2.jpg";
        case "other":
          return "images/categories/other.jpg";
        case "all":
          return "images/categories/all.jpg";
        default:
          return null;
      }
    }

    function setLifestyleBackground(category) {
      const bgEl = document.getElementById("article-bg");
      if (!bgEl) return;
      const url = lifestyleBackgroundForCategory(category);
      if (!url) {
        bgEl.style.display = "none";
        bgEl.style.backgroundImage = "";
        return;
      }
      bgEl.style.backgroundImage = "url('" + url + "')";
      bgEl.style.display = "block";
    }

    // 🔚 Πηγές στο τέλος, με emoji τίτλο και dedupe ανά host
    const SOURCE_LABELS = {
      "ertnews.gr": "ERT News",
      "tanea.gr": "TA NEA",
      "in.gr": "in.gr",
      "cnn.gr": "CNN Greece",
      "amna.gr": "ΑΠΕ-ΜΠΕ (AMNA)",
      "kathimerini.gr": "Η Καθημερινή",
      "newsbeast.gr": "Newsbeast",
      "thehappynews.gr": "The Happy News",
      "culturenow.gr": "CultureNow",
      "gazzetta.gr": "Gazzetta",
      "sport24.gr": "SPORT24",
      "novasports.gr": "Novasports",
      "reuters.com": "Reuters",
      "uefa.com": "UEFA",
    };

    function normalizeHost(url) {
      if (!url) return "";
      try {
        return new URL(url).hostname.replace(/^www\./i, "").toLowerCase();
      } catch {
        return "";
      }
    }

    function prettifyHost(host) {
      if (!host) return "";
      const parts = host.split(".");
      const trimmed = parts.length > 2 ? parts.slice(-2) : parts;
      const base = trimmed.join(".");
      return base
        .split("-")
        .map((w) => (w ? w[0].toUpperCase() + w.slice(1) : ""))
        .join("-");
    }

    function getSourceLabel(url) {
      const host = normalizeHost(url);
      if (!host) return "";
      if (SOURCE_LABELS[host]) return SOURCE_LABELS[host];
      return prettifyHost(host);
    }

    function dedupeSourcesByHost(sources) {
      const seen = new Set();
      const result = [];
      for (const item of sources) {
        const host = normalizeHost(item.url);
        const key = host || item.title || item.url;
        if (!key || seen.has(key)) continue;
        seen.add(key);
        result.push({ ...item, host });
      }
      return result;
    }

    function renderSourcesSection(container, article, fallbackText) {
      if (!container) return;

      const sources = Array.isArray(article?.sources) ? article.sources : [];
      const fallbackName = article?.sourceName || null;
      const fallbackUrl = article?.sourceUrl || null;

      const items = [];

      if (sources.length) {
        for (const s of sources) {
          if (typeof s === "string") {
            const url = s.startsWith("http") ? s : `https://${s}`;
            const label = getSourceLabel(url) || "Πηγή";
            items.push({ title: label, url });
            continue;
          }

          const url = s?.url || s?.sourceUrl || "";
          const label =
            getSourceLabel(url) ||
            s?.title ||
            s?.publisher ||
            s?.sourceName ||
            s?.source ||
            "Πηγή";

          if (!url && !label) continue;
          items.push({ title: label, url });
        }
      }

      if (!items.length && fallbackUrl && fallbackUrl !== "#") {
        const label = getSourceLabel(fallbackUrl) || fallbackName || "Πηγή";
        items.push({ title: label, url: fallbackUrl });
      }

      if (!items.length && fallbackText) {
        items.push({ title: fallbackText, url: "" });
      }

      const validItems = items.filter((i) => i.title || i.url);
      const deduped = dedupeSourcesByHost(validItems);

      if (!deduped.length) {
        container.innerHTML = "";
        container.style.display = "none";
        return;
      }

      const itemsHtml = deduped
        .map((item) => {
          const safeTitle = escapeHtml(item.title || "Πηγή");
          if (item.url) {
            const safeUrl = escapeHtml(item.url);
            return `<li><a href="${safeUrl}" target="_blank" rel="noopener">${safeTitle}</a></li>`;
          }
          return `<li>${safeTitle}</li>`;
        })
        .join("");

      container.innerHTML = `
        <p class="text-muted small mb-1">🌍 Πηγές</p>
        <ul class="small mb-0 ps-3">${itemsHtml}</ul>
      `;
      container.style.display = "block";
    }

    function renderArticleContent({
      article,
      titleEl,
      bodyEl,
      sourceEl,
      imageWrapper,
      imageEl,
      videoWrapper,
      videoContainer,
      listenBtn,
    }) {
      if (!article) return;

      const displayTitle = article.simpleTitle || article.title || "Ενημέρωση σε απλά λόγια";
      const cleaned = cleanMarkdown(article.simpleText || "");

      if (article.category) {
        setLifestyleBackground(article.category);
      }

      titleEl.textContent = displayTitle;
      bodyEl.innerHTML = cleaned.replace(/\n/g, "<br/>");

      if (videoContainer) {
        videoContainer.innerHTML = "";
      }

      // ✅ Εικόνα ΜΟΝΟ αν είναι Pixabay
      setArticleImage(imageWrapper, imageEl, article.imageUrl || "", displayTitle);

      if (videoWrapper && videoContainer) {
        if (article.videoUrl) {
          let node;
          const url = article.videoUrl;

          if (/\.(mp4|webm|ogg)(\?|$)/i.test(url)) {
            node = document.createElement("video");
            node.className = "article-video";
            node.controls = true;

            const source = document.createElement("source");
            source.src = url;
            node.appendChild(source);
          } else {
            node = document.createElement("iframe");
            node.className = "article-video";
            node.src = url;
            node.loading = "lazy";
            node.allowFullscreen = true;
            node.setAttribute("frameborder", "0");
            node.setAttribute(
              "allow",
              "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            );
          }

          videoContainer.appendChild(node);
          videoWrapper.style.display = "block";
        } else {
          videoWrapper.style.display = "none";
        }
      }

      renderSourcesSection(sourceEl, article, null);

      document.title = displayTitle + " - Εύκολα Νέα";
      listenBtn.disabled = false;
      setupTtsButton(listenBtn, displayTitle, cleaned);
    }

    async function loadNewsArticle({
      idParam,
      titleEl,
      bodyEl,
      sourceEl,
      imageWrapper,
      imageEl,
      videoWrapper,
      videoContainer,
      listenBtn,
    }) {
      if (!idParam) {
        titleEl.textContent = "Δεν βρέθηκε το άρθρο";
        bodyEl.textContent = "Λείπει το αναγνωριστικό του άρθρου (id).";
        listenBtn.disabled = true;
        return;
      }

      try {
        const res = await fetch("news.json?cachebust=" + Date.now());
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        const articles = (data && data.articles) || [];

        let article = articles.find((a) => String(a.id) === String(idParam));

        if (!article) {
          const idx = Number(idParam);
          if (!Number.isNaN(idx) && idx >= 0 && idx < articles.length) {
            article = articles[idx];
          }
        }

        if (!article) {
          titleEl.textContent = "Δεν βρέθηκε το άρθρο";
          bodyEl.textContent = "Ίσως το άρθρο να έχει αφαιρεθεί.";
          listenBtn.disabled = true;
          return;
        }

        renderArticleContent({
          article,
          titleEl,
          bodyEl,
          sourceEl,
          imageWrapper,
          imageEl,
          videoWrapper,
          videoContainer,
          listenBtn,
        });
      } catch (err) {
        console.error(err);
        titleEl.textContent = "Προέκυψε σφάλμα";
        bodyEl.textContent = "Δεν μπόρεσα να φορτώσω το άρθρο: " + err.message;
        listenBtn.disabled = true;
      }
    }

    async function loadNewsCategoryArticle({
      categoryKey,
      titleEl,
      bodyEl,
      sourceEl,
      imageWrapper,
      imageEl,
      videoWrapper,
      videoContainer,
      listenBtn,
    }) {
      if (!categoryKey) {
        titleEl.textContent = "Δεν βρέθηκε η κατηγορία";
        bodyEl.textContent = "Δεν υπάρχει πληροφορία για την κατηγορία.";
        listenBtn.disabled = true;
        return;
      }

      setLifestyleBackground(categoryKey);

      try {
        const res = await fetch("news.json?cachebust=" + Date.now());
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        const byCategory = data.articlesByCategory || {};
        const articles = byCategory[categoryKey] || [];
        const article = articles[0];

        if (!article) {
          titleEl.textContent = "Δεν βρέθηκε άρθρο για αυτή την κατηγορία";
          bodyEl.textContent = "Προσπάθησε ξανά σε λίγο, δεν υπάρχει διαθέσιμο άρθρο.";
          listenBtn.disabled = true;
          sourceEl.innerHTML = "";
          setArticleImage(imageWrapper, imageEl, null, "");
          return;
        }

        renderArticleContent({
          article,
          titleEl,
          bodyEl,
          sourceEl,
          imageWrapper,
          imageEl,
          videoWrapper,
          videoContainer,
          listenBtn,
        });
      } catch (err) {
        console.error("Σφάλμα φόρτωσης news.json για κατηγορία:", err);
        titleEl.textContent = "Προέκυψε σφάλμα";
        bodyEl.textContent =
          "Δεν μπόρεσα να φορτώσω τις ειδήσεις για την κατηγορία: " + err.message;
        listenBtn.disabled = true;
      }
    }

    async function loadArticle() {
      const titleEl = document.getElementById("article-title");
      const bodyEl = document.getElementById("article-body");
      const sourceEl = document.getElementById("article-sources");
      const imageWrapper = document.getElementById("article-image-wrapper");
      const imageEl = document.getElementById("article-image");
      const videoWrapper = document.getElementById("article-video-wrapper");
      const videoContainer = document.getElementById("article-video-container");
      const listenBtn = document.getElementById("listen-btn");

      if (sourceParam === "serious") {
        if (idParam) {
          await loadNewsArticle({
            idParam,
            titleEl,
            bodyEl,
            sourceEl,
            imageWrapper,
            imageEl,
            videoWrapper,
            videoContainer,
            listenBtn,
          });
        } else {
          await loadNewsCategoryArticle({
            categoryKey: "serious",
            titleEl,
            bodyEl,
            sourceEl,
            imageWrapper,
            imageEl,
            videoWrapper,
            videoContainer,
            listenBtn,
          });
        }
      } else if (sourceParam === "lifestyle") {
        if (idParam) {
          await loadNewsArticle({
            idParam,
            titleEl,
            bodyEl,
            sourceEl,
            imageWrapper,
            imageEl,
            videoWrapper,
            videoContainer,
            listenBtn,
          });
        } else {
          await loadNewsCategoryArticle({
            categoryKey: categoryParam,
            titleEl,
            bodyEl,
            sourceEl,
            imageWrapper,
            imageEl,
            videoWrapper,
            videoContainer,
            listenBtn,
          });
        }
      } else if (sourceParam && sourceParam !== "news" && !idParam) {
        await loadNewsCategoryArticle({
          categoryKey: sourceParam,
          titleEl,
          bodyEl,
          sourceEl,
          imageWrapper,
          imageEl,
          videoWrapper,
          videoContainer,
          listenBtn,
        });
      } else {
        await loadNewsArticle({
          idParam,
          titleEl,
          bodyEl,
          sourceEl,
          imageWrapper,
          imageEl,
          videoWrapper,
          videoContainer,
          listenBtn,
        });
      }
    }

    function setupBackLink(source, category) {
      const backLink = document.querySelector(".back-link");
      if (!backLink) return;

      if (category) {
        backLink.href = "category.html?category=" + encodeURIComponent(category);
      } else if (source && source !== "news") {
        backLink.href = "category.html?category=" + encodeURIComponent(source);
      } else {
        backLink.href = "index.html";
      }
    }

    function setupSiteTitleReload() {
      const titleEl = document.querySelector(".site-title");
      if (!titleEl) return;

      titleEl.addEventListener("click", (event) => {
        event.preventDefault();
        window.location.reload();
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupSiteTitleReload();
      setupBackLink(sourceParam, categoryParam);
      loadArticle();
    });
  </script>
</body>
</html>
